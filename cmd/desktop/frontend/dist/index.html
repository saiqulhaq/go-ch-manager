<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go CH Manager</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Segoe UI, Roboto, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e2e8f0;
    }
    main {
      max-width: 640px;
      padding: 24px;
      text-align: center;
      line-height: 1.5;
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 12px;
    }
    h1 {
      margin-top: 0;
      font-size: 1.5rem;
    }
    p {
      margin-bottom: 0;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <main>
    <h1>Go CH Manager</h1>
    <p>Desktop frontend assets are loaded successfully.</p>
  </main>
</body>
</html>
