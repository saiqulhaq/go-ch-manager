name: Build Fiber App Bundles

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - os: 'linux-latest'
            runner: 'ubuntu-22.04'
            artifact: 'Go-CH-Manager-Linux-amd64-WebUI'
            binary: 'Go CH Manager Server'
          - os: 'windows-latest'
            runner: 'windows-latest'
            artifact: 'Go-CH-Manager-Windows-amd64-WebUI'
            binary: 'Go CH Manager Server.exe'
          - os: 'darwin-latest'
            runner: 'macos-latest'
            artifact: 'Go-CH-Manager-macOS-universal-WebUI'
            binary: 'Go CH Manager Server'

    runs-on: ${{ matrix.build.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Fiber Server Bundle
        shell: bash
        run: |
          mkdir -p dist/bundle/internal
          go build -o "dist/bundle/${{ matrix.build.binary }}" ./cmd/app
          cp -R internal/views dist/bundle/internal/

      - name: Create Windows Launcher
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cat > "dist/bundle/Start Go CH Manager.bat" << 'EOF'
          @echo off
          setlocal
          cd /d "%~dp0"
          set API_PORT=:8760
          start "Go CH Manager Server" "%~dp0Go CH Manager Server.exe"
          timeout /t 2 /nobreak >nul
          start "Go CH Manager UI" "http://127.0.0.1:8760/connections/create"
          EOF

      - name: Create Unix Launcher
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cat > dist/bundle/start-go-ch-manager.sh << 'EOF'
          #!/usr/bin/env sh
          set -eu
          cd "$(dirname "$0")"
          export API_PORT=:8760
          ./"Go CH Manager Server"
          EOF
          chmod +x dist/bundle/start-go-ch-manager.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.artifact }}
          path: dist/bundle/**

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
